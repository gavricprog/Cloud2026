services:
  postgres:
    image: postgres:16
    container_name: smart-apiary-postgres
    environment:
      POSTGRES_DB: smart_apiary
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - smart_apiary_pgdata:/var/lib/postgresql/data

volumes:
  smart_apiary_pgdata:

